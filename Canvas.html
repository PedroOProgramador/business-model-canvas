<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Modelo de Negócio Canvas</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    color: #222;
  }

  header {
    text-align: center;
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
  }

  h1 {
    margin: 0;
    font-size: 22px;
  }

  .botoes {
    text-align: center;
    padding: 10px;
  }

  button {
    margin: 5px;
    padding: 8px 14px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
  }

  button:hover {
    background: #eee;
  }

  .canvas {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(3, 200px);
    gap: 10px;
    padding: 10px;
  }

  .caixa {
    background: white;
    border: 1px solid #ccc;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .titulo {
    background: #e9eef7;
    font-size: 13px;
    text-align: center;
    padding: 6px;
    font-weight: bold;
  }

  textarea {
    flex: 1;
    border: none;
    resize: none;
    padding: 10px;
    font-size: 13px;
    outline: none;
  }

  /* Layout do Canvas */
  .parcerias { grid-column: 1; grid-row: 1 / span 2; }
  .atividades { grid-column: 2; grid-row: 1; }
  .proposta_valor { grid-column: 3; grid-row: 1 / span 2; }
  .relacionamento { grid-column: 4; grid-row: 1; }
  .segmentos { grid-column: 5; grid-row: 1 / span 2; }

  .recursos { grid-column: 2; grid-row: 2; }
  .canais { grid-column: 4; grid-row: 2; }

  .custos { grid-column: 1 / span 2; grid-row: 3; }
  .receitas { grid-column: 3 / span 3; grid-row: 3; }

@page {
  size: A4 landscape;
  margin: 5mm;
}

@media print {

  body {
    margin: 0;
    background: white;
  }

  header,
  .botoes {
    display: none !important;
  }

  .canvas {
    width: 100%;
    height: 190mm;

    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(3, 1fr);

    gap: 3mm;
  }

  .caixa {
    display: flex;
    flex-direction: column;

    width: 100%;
    height: 100%;

    overflow: hidden;

    break-inside: avoid;
    page-break-inside: avoid;
  }

  .titulo {
    font-size: 10px;
    padding: 4px;
  }

  textarea {
    font-size: 10px;
    padding: 6px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Modelo de Negócio Canvas</h1>
</header>

<div class="botoes">
  <button onclick="salvar()">Salvar</button>
  <button onclick="limpar()">Limpar</button>
  <button onclick="exportar()">Exportar TXT</button>
</div>

<div class="canvas">

  <div class="caixa parcerias">
    <div class="titulo">Parcerias Principais</div>
    <textarea id="parcerias"></textarea>
  </div>

  <div class="caixa atividades">
    <div class="titulo">Atividades-Chave</div>
    <textarea id="atividades"></textarea>
  </div>

  <div class="caixa proposta_valor">
    <div class="titulo">Proposta de Valor</div>
    <textarea id="proposta_valor"></textarea>
  </div>

  <div class="caixa relacionamento">
    <div class="titulo">Relacionamento com Clientes</div>
    <textarea id="relacionamento"></textarea>
  </div>

  <div class="caixa segmentos">
    <div class="titulo">Segmentos de Clientes</div>
    <textarea id="segmentos"></textarea>
  </div>

  <div class="caixa recursos">
    <div class="titulo">Recursos Principais</div>
    <textarea id="recursos"></textarea>
  </div>

  <div class="caixa canais">
    <div class="titulo">Canais</div>
    <textarea id="canais"></textarea>
  </div>

  <div class="caixa custos">
    <div class="titulo">Estrutura de Custos</div>
    <textarea id="custos"></textarea>
  </div>

  <div class="caixa receitas">
    <div class="titulo">Fontes de Receita</div>
    <textarea id="receitas"></textarea>
  </div>

</div>

<script>

const campos = [
  "parcerias",
  "atividades",
  "proposta_valor",
  "relacionamento",
  "segmentos",
  "recursos",
  "canais",
  "custos",
  "receitas"
];

// salvar automaticamente (seguro)
function iniciarAutoSave() {
  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    const salvo = localStorage.getItem(id);
    if (salvo !== null) el.value = salvo;

    el.addEventListener("input", () => {
      localStorage.setItem(id, el.value);
    });
  });
}

// salvar manual
function salvar() {
  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    localStorage.setItem(id, el.value);
  });
  alert("Salvo com sucesso!");
}

// limpar
function limpar() {
  if (!confirm("Deseja realmente limpar tudo?")) return;

  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = "";
    localStorage.removeItem(id);
  });
}

// exportar
function exportar() {
  let texto = "MODELO DE NEGÓCIO CANVAS\n\n";

  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    texto += id.toUpperCase() + ":\n" + el.value + "\n\n";
  });

  const blob = new Blob([texto], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "canvas.txt";
  link.click();
}

// iniciar tudo sem travar página
document.addEventListener("DOMContentLoaded", iniciarAutoSave);
</script>

</body>
</html>
